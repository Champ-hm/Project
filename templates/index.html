<!DOCTYPE html>
<html>
<head>
    <title>Solo Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* This section handles the look and centering */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #f4f4f9;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        button {
            background-color: #28a745; /* Green color */
            color: white;              /* White text */
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838; /* Slightly darker green when hovering */
        }

        #display {
            margin-top: 30px;
            font-size: 20px;
            color: #28a745;
            text-align: center;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <h1>My Solo Discovery</h1>
    
    <button onclick="fetchData()">Reveal Secret Message</button>
    
    <div id="display"></div>

    <script>
        async function fetchData() {
            const displayDiv = document.getElementById('display');
            displayDiv.innerText = "Fetching your secret...";
            
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (data && data.length > 0) {
                    displayDiv.innerText = `Title: ${data[0].title} \n Message: ${data[0].secret_message}`;
                } else {
                    displayDiv.innerText = "No data found in your database!";
                }
            } catch (error) {
                displayDiv.innerText = "Error connecting to the backend.";
            }
        }
    </script>
</body>
</html>
